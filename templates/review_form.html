{% extends "base.html" %}

{% block title %}Новая рецензия — {{ book.title }}{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
{% endblock %}

{% block content %}
<h1 class="page-title">Новая рецензия</h1>
<p class="form-subtitle">{{ book.title }}</p>

<form method="POST" class="content-form">
    <div class="form-group">
        <label for="rating">Оценка</label>
        <select id="rating" name="rating">
            <option value="5" {% if form_data.rating == '5' %}selected{% endif %}>отлично</option>
            <option value="4" {% if form_data.rating == '4' %}selected{% endif %}>хорошо</option>
            <option value="3" {% if form_data.rating == '3' %}selected{% endif %}>удовлетворительно</option>
            <option value="2" {% if form_data.rating == '2' %}selected{% endif %}>неудовлетворительно</option>
            <option value="1" {% if form_data.rating == '1' %}selected{% endif %}>плохо</option>
            <option value="0" {% if form_data.rating == '0' %}selected{% endif %}>ужасно</option>
        </select>
    </div>

    <div class="form-group">
        <label for="text">Текст рецензии</label>
        <textarea id="text" name="text">{{ form_data.text }}</textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('books.view', book_id=book.id) }}" class="btn">Отмена</a>
    </div>
</form>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script src="{{ url_for('static', filename='js/forms.js') }}"></script>
<script>initEasyMDE("text", "150px");</script>
{% endblock %}
